name: Deploy Supabase Functions

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install Supabase CLI
        run: |
          curl -fsSL https://deb.supabase.com/key.asc | sudo apt-key add -
          echo "deb [arch=amd64] https://deb.supabase.com $(lsb_release -cs) main" | sudo tee -a /etc/apt/sources.list.d/supabase.list
          sudo apt-get update
          sudo apt-get install -y supabase

      - name: Deploy Edge Functions
        run: |
          supabase functions deploy --project-ref vrggahqfapozygajklaj
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
